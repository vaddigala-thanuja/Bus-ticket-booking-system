<!DOCTYPE html>
<html>
<head>
<title>User Login</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(120deg,#f7c6a4,#f1a05d);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.container{
background:white;
width:85%;
height:75%;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
display:flex;
padding:40px;
position:relative;
}

.left{
width:50%;
}

.left h1{
color:#e76f51;
}

.left p{
color:#444;
}

.form-box{
margin-top:20px;
width:300px;
}

label{
display:block;
margin-top:15px;
}

input{
width:100%;
padding:8px;
border-radius:5px;
border:1px solid #ccc;
}

.right img{
width:350px;
}

.back{
position:absolute;
top:20px;
right:30px;
background:#e76f51;
color:white;
border:none;
padding:8px 20px;
border-radius:20px;
cursor:pointer;
}

.proceed{
position:absolute;
bottom:30px;
right:40px;
background:#e76f51;
color:white;
border:none;
padding:10px 25px;
border-radius:20px;
cursor:pointer;
}

</style>

<script>

function validateForm(){

var name=document.getElementById("name").value;
var phone=document.getElementById("phone").value;

if(name=="" || phone==""){
alert("Please enter name and phone number.");
return;
}

var phonePattern=/^[0-9]{10}$/;

if(!phonePattern.test(phone)){
alert("Please enter a valid phone number.");
return;
}

window.location.href="destination.html";

}

</script>

</head>

<body>

<div class="container">

<button class="back" onclick="location.href='index.html'">Back</button>

<div class="left">

<h1>User Login</h1>

<p>Enter your details to continue your journey</p>

<div class="form-box">

<label>Name *</label>
<input type="text" id="name">

<label>Phone Number *</label>
<input type="text" id="phone">

<label>Email</label>
<input type="email">

</div>

</div>

<div class="right">

<img src="bus.png">

</div>

<button class="proceed" onclick="validateForm()">Proceed to Login</button>

</div>

</body>
</html>
